<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>room3dgs — 室内3DGS</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <h1>room3dgs</h1>
    <p class="sub">室内写真から 3D Gaussian Splatting を作成（gfx1151 / WorldMirror）</p>
  </header>

  <main>
    <section class="panel">
      <h2>新しい写真セット</h2>
      <p class="hint">同じ部屋を別視点で <b>2枚以上</b>（推奨 8〜15枚、重なりを持たせて）。</p>
      <form id="new-set-form">
        <input type="text" id="set-name" placeholder="セット名（例: リビング）" maxlength="40" required>
        <div id="drop" class="dropzone">
          <input type="file" id="files" accept="image/*" multiple hidden>
          <p>クリック、またはここに写真をドラッグ&ドロップ</p>
          <p id="pick-count" class="pick-count"></p>
        </div>
        <button type="submit" id="save-btn" disabled>このセットを保存</button>
      </form>
      <p id="new-set-msg" class="msg"></p>
    </section>

    <section class="panel">
      <h2>保存済みセット <span id="set-count" class="count"></span></h2>
      <div id="sets" class="sets-grid"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
